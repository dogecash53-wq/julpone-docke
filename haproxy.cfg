global
    # Log to stdout para sa Cloud Logging
    log stdout format raw local0
    # Taasan ang file descriptors para sa mataas na concurrency
    maxconn 65535
    # Performance tuning para sa malalaking data transfer (Speed)
    tune.bufsize 65536
    tune.rcvbuf.client 65536
    tune.rcvbuf.server 65536
    # Iwasan ang mga unnecessary overhead
    tune.ssl.default-dh-param 2048

defaults
    log global
    mode tcp
    option tcplog
    # Optimization para sa mabilis na connection establishment
    option tcp-smart-accept
    option tcp-smart-connect
    
    # Timeouts (Stable pero responsive)
    timeout connect 5s
    timeout client 300s
    timeout server 300s
    timeout tunnel 1h  # Importante para hindi maputol ang VPN tunnel

frontend vpn_front
    # Siguraduhin na ito ang port na naka-expose sa internet
    bind *:8085
    default_backend vpn_back

backend vpn_back
    mode tcp
    # Ginagamit ang leastconn para ipasa ang load sa pinaka-available na thread
    balance leastconn
    # Health checks para siguraduhing laging buhay ang Nginx
    server nginx_server 127.0.0.1:8080 check inter 2000 rise 2 fall 5
