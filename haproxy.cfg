global
    log /dev/log local0
    maxconn 4096

defaults
    mode tcp
    timeout connect 5s
    timeout client 50s
    timeout server 50s

# Halimbawa para sa unang location (/julpone-freenet)
frontend ft_freenet_0
    bind 127.0.0.1:10000
    default_backend bk_xray_0

backend bk_xray_0
    server xray 127.0.0.1:20000

# Kailangan mong gawin ito para sa lahat ng 12 ports (10000 hanggang 10011)
# at ituro ang bawat isa sa kaukulang Xray port (halimbawa: 20000-20011)
