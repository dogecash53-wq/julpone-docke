global
    log stdout format raw local0 warning
    maxconn 65535
    tune.bufsize 65536
    tune.rcvbuf.client 65536
    tune.rcvbuf.server 65536

    user haproxy
    group haproxy
    
defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  tcp-smart-accept
    option  tcp-smart-connect
    
    timeout connect         10s
    timeout client          1m
    timeout server          1m
    timeout tunnel          1h
    timeout client-fin      30s
    timeout server-fin      30s

frontend cloudrun_ingress
    bind *:8080
    mode http

    # Cloud Run Health Check
    acl is_health path -i /health
    http-request return status 200 content-type "text/plain" string "OK" if is_health

    # UI Dashboard - Serve the index.html on root path
    acl is_root path -i /
    acl is_index path -i /index.html
    http-request return status 200 content-type "text/html; charset=utf-8" file "/usr/local/etc/haproxy/index.html" if is_root || is_index

    # --- TROJAN PATHS ---
    use_backend bk_trojan_ws if { path /julpone-freenet }
    use_backend bk_trojan_hu if { path /julpone-freenet-hu }
    use_backend bk_trojan_xh if { path /julpone-freenet-xh }
    use_backend bk_trojan_grpc if { path -m beg /julpone-freenet-grpc/ }

    # --- VMESS PATHS ---
    use_backend bk_vmess_ws if { path /vmess-julpone }
    use_backend bk_vmess_hu if { path /vmess-julpone-hu }
    use_backend bk_vmess_xh if { path /vmess-julpone-xh }
    use_backend bk_vmess_grpc if { path -m beg /vmess-julpone-grpc/ }

    # --- VLESS PATHS ---
    use_backend bk_vless_ws if { path /vless-julpone }
    use_backend bk_vless_hu if { path /vless-julpone-hu }
    use_backend bk_vless_xh if { path /vless-julpone-xh }
    use_backend bk_vless_grpc if { path -m beg /vless-julpone-grpc/ }

    # --- SHADOWSOCKS PATHS ---
    use_backend bk_ss_ws if { path /ss-julpone }
    use_backend bk_ss_hu if { path /ss-julpone-hu }
    use_backend bk_ss_xh if { path /ss-julpone-xh }
    use_backend bk_ss_grpc if { path -m beg /ss-julpone-grpc/ }

    default_backend bk_blackhole

# --- XRAY VPN BACKENDS ---
backend bk_trojan_ws
    mode tcp
    server xray 127.0.0.1:10000
backend bk_trojan_hu
    mode tcp
    server xray 127.0.0.1:10001
backend bk_trojan_xh
    mode tcp
    server xray 127.0.0.1:10002
backend bk_trojan_grpc
    mode tcp
    server xray 127.0.0.1:10012 proto h2

backend bk_vmess_ws
    mode tcp
    server xray 127.0.0.1:10003
backend bk_vmess_hu
    mode tcp
    server xray 127.0.0.1:10004
backend bk_vmess_xh
    mode tcp
    server xray 127.0.0.1:10005
backend bk_vmess_grpc
    mode tcp
    server xray 127.0.0.1:10013 proto h2

backend bk_vless_ws
    mode tcp
    server xray 127.0.0.1:10006
backend bk_vless_hu
    mode tcp
    server xray 127.0.0.1:10007
backend bk_vless_xh
    mode tcp
    server xray 127.0.0.1:10008
backend bk_vless_grpc
    mode tcp
    server xray 127.0.0.1:10014 proto h2

backend bk_ss_ws
    mode tcp
    server xray 127.0.0.1:10009
backend bk_ss_hu
    mode tcp
    server xray 127.0.0.1:10010
backend bk_ss_xh
    mode tcp
    server xray 127.0.0.1:10011
backend bk_ss_grpc
    mode tcp
    server xray 127.0.0.1:10015 proto h2

backend bk_blackhole
    mode http
    http-request return status 404 content-type "text/plain" string "NTC NETWORKS"
