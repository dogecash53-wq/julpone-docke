global
    log stdout format raw local0 warning
    maxconn 65535
    tune.bufsize 65536
    tune.rcvbuf.client 65536
    tune.rcvbuf.server 65536

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option tcp-smart-accept
    option tcp-smart-connect
    
    timeout connect 10s
    timeout client 1m
    timeout server 1m
    timeout tunnel 1h
    timeout client-fin 30s
    timeout server-fin 30s

frontend cloudrun_ingress
    bind *:80 # HAProxy ang sasalo sa public port 80/8080
    
    # Health check
    acl is_health path -i /health
    http-request return status 200 content-type "text/plain" string "OK" if is_health

    # Lahat ng traffic, ipapasa natin sa Nginx na nakikinig sa port 8080
    default_backend bk_nginx

backend bk_nginx
    # Ipinapasa ang lahat ng request sa Nginx
    # Siguraduhin na ang Nginx mo ay naka-listen sa port 8080
    server nginx_proxy 127.0.0.1:8080
