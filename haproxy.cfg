global
    # Siguraduhin na ang log ay nasa stdout para mabasa ng Cloud Logging
    log stdout format raw local0
    maxconn 65535
    # Huwag gamitin ang "daemon" mode sa container
    tune.bufsize 65536

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend cloudrun_ingress
    # Gamitin ang PORT variable mula sa environment
    bind :8080 
    
    # Health check para sa Cloud Run (Napakahalaga nito!)
    acl is_health path -i /health
    http-request return status 200 content-type "text/plain" string "OK" if is_health

    # Lahat ng trapiko ay ipasa sa Nginx na nasa loob din ng container
    default_backend bk_nginx

backend bk_nginx
    server nginx_proxy 127.0.0.1:8081 # Siguraduhin na ang Nginx mo ay naka-listen dito
    
# Tandaan: Sa Cloud Run, dapat mong patakbuhin ang Nginx at HAProxy 
# sa loob ng iisang container (halimbawa, gamit ang supervisord).
