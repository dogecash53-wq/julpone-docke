global
    log stdout format raw local0
    maxconn 65535

defaults
    log global
    mode http
    option httplog
    timeout connect 10s
    timeout client 1m
    timeout server 1m
    timeout tunnel 1h

frontend vpn_front
    bind :8080
    default_backend bk_nginx

backend bk_nginx
    # Ipinapasa ang traffic sa Nginx (na nasa 8081 na dahil sa start.sh)
    server nginx_server 127.0.0.1:8085 check
