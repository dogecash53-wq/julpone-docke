global
    log stdout format raw local0 warning
    maxconn 65535
    tune.bufsize 65536
    tune.rcvbuf.client 65536
    tune.rcvbuf.server 65536

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  tcp-smart-accept
    option  tcp-smart-connect
    
    timeout connect         10s
    timeout client          1m
    timeout server          1m
    timeout tunnel          1h  # Kritikal para sa WebSocket/HTTP Upgrade/XHTTP
    timeout client-fin      30s
    timeout server-fin      30s

frontend cloudrun_ingress
    bind *:8080

    # Ipadala ang Health Check at Web Traffic sa Nginx (Port 8085)
    acl is_health path -i /health
    acl is_root path -i /
    use_backend bk_nginx if is_health || is_root

    # --- TROJAN PATHS ---
    use_backend bk_trojan_ws if { path /julpone-freenet }
    use_backend bk_trojan_hu if { path /julpone-freenet-hu }
    use_backend bk_trojan_xh if { path /julpone-freenet-xh }

    # --- VMESS PATHS ---
    use_backend bk_vmess_ws if { path /vmess-julpone }
    use_backend bk_vmess_hu if { path /vmess-julpone-hu }
    use_backend bk_vmess_xh if { path /vmess-julpone-xh }

    # --- VLESS PATHS ---
    use_backend bk_vless_ws if { path /vless-julpone }
    use_backend bk_vless_hu if { path /vless-julpone-hu }
    use_backend bk_vless_xh if { path /vless-julpone-xh }

    # --- SHADOWSOCKS PATHS ---
    use_backend bk_ss_ws if { path /ss-julpone }
    use_backend bk_ss_hu if { path /ss-julpone-hu }
    use_backend bk_ss_xh if { path /ss-julpone-xh }

    default_backend bk_blackhole

# --- WEB SERVER BACKEND (NGINX) ---
backend bk_nginx
    server nginx_local 127.0.0.1:8085 check

# --- XRAY VPN BACKENDS ---
backend bk_trojan_ws
    server xray 127.0.0.1:10000 check
backend bk_trojan_hu
    server xray 127.0.0.1:10001 check
backend bk_trojan_xh
    server xray 127.0.0.1:10002 check

backend bk_vmess_ws
    server xray 127.0.0.1:10003 check
backend bk_vmess_hu
    server xray 127.0.0.1:10004 check
backend bk_vmess_xh
    server xray 127.0.0.1:10005 check

backend bk_vless_ws
    server xray 127.0.0.1:10006 check
backend bk_vless_hu
    server xray 127.0.0.1:10007 check
backend bk_vless_xh
    server xray 127.0.0.1:10008 check

backend bk_ss_ws
    server xray 127.0.0.1:10009 check
backend bk_ss_hu
    server xray 127.0.0.1:10010 check
backend bk_ss_xh
    server xray 127.0.0.1:10011 check

backend bk_blackhole
    http-request return status 404 content-type "text/plain" string "NTC NETWORKS"
