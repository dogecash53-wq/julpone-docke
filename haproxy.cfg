global
    log /dev/log local0
    maxconn 4096

defaults
    mode tcp
    timeout connect 5s
    timeout client 86400s
    timeout server 86400s

# Trojan WS (Port 10000 -> 20000)
frontend ft_freenet_0
    bind 127.0.0.1:10000
    default_backend bk_xray_0
backend bk_xray_0
    server xray 127.0.0.1:20000

# (Ulitin ito para sa 10001-10011 at 20001-20011)
# Halimbawa para sa ss-julpone-xh (Port 10011 -> 20011)
frontend ft_ss_xh
    bind 127.0.0.1:10011
    default_backend bk_ss_xh
backend bk_ss_xh
    server xray 127.0.0.1:20011
