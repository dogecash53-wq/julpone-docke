global
    log /dev/log local0
    maxconn 4096

defaults
    mode tcp
    timeout connect 5s
    timeout client 86400s
    timeout server 86400s

# Trojan
frontend ft_trojan_ws
    bind 127.0.0.1:10000
    default_backend bk_trojan_ws
backend bk_trojan_ws
    server xray 127.0.0.1:20000

frontend ft_trojan_hu
    bind 127.0.0.1:10001
    default_backend bk_trojan_hu
backend bk_trojan_hu
    server xray 127.0.0.1:20001

frontend ft_trojan_xh
    bind 127.0.0.1:10002
    default_backend bk_trojan_xh
backend bk_trojan_xh
    server xray 127.0.0.1:20002

