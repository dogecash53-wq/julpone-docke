user nginx;
worker_processes auto;
events { worker_connections 4096; }

http {
    include /etc/nginx/mime.types;
    sendfile on;
    
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Proxy params para sa lahat
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;

    server {
        listen 8081;
        server_name _;

        # Lahat ng path na nasa config mo ay ituturo sa kaukulang port
        # Gamit ang generic proxy_pass na may tamang headers
        location /julpone-freenet { proxy_pass http://127.0.0.1:10000; }
        location /julpone-freenet-hu { proxy_pass http://127.0.0.1:10001; }
        location /julpone-freenet-xh { proxy_pass http://127.0.0.1:10002; }
        location /vmess-julpone { proxy_pass http://127.0.0.1:10003; }
        location /vmess-julpone-hu { proxy_pass http://127.0.0.1:10004; }
        location /vmess-julpone-xh { proxy_pass http://127.0.0.1:10005; }
        location /vless-julpone { proxy_pass http://127.0.0.1:10006; }
        location /vless-julpone-hu { proxy_pass http://127.0.0.1:10007; }
        location /vless-julpone-xh { proxy_pass http://127.0.0.1:10008; }
        location /ss-julpone { proxy_pass http://127.0.0.1:10009; }
        location /ss-julpone-hu { proxy_pass http://127.0.0.1:10010; }
        location /ss-julpone-xh { proxy_pass http://127.0.0.1:10011; }
    }
}
