worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    include mime.types;
    default_type application/octet-stream;
    
    # Advanced TCP Acceleration Flags
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # Ultra Keep-Alive for Constant High-Speed Connection Streams
    keepalive_timeout 300s;
    keepalive_requests 500000;
    reset_timedout_connection on;
    
    # High-Throughput Stream Buffering Limits
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;
    server_tokens off;

    # Core DNS Resolvers
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 3s;
    proxy_connect_timeout 10s;

    server {
        listen 8080 default_server backlog=4096;
        server_name _;

        # Cloud Run Service Active Indicator Check
        location = /health {
            return 200 "OK";
            add_header Content-Type text/plain;
            access_log off;
        }

        # UI Dashboard Static Serve Location
        location = / {
            root /usr/local/openresty/nginx/html;
            index index.html;
            access_log off;
        }

        # ====================================================================
        # TROJAN ROUTING PATHS (Aligned with config.json)
        # ====================================================================
        # Trojan - WebSocket
        location /julpone-freenet {
            proxy_pass http://127.0.0.1:10000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_socket_keepalive on;
        }
        # Trojan - HTTP Upgrade (Optimized for HTTPUpgrade)
        location /julpone-freenet-hu {
            proxy_pass http://127.0.0.1:10001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_socket_keepalive on;
        }
        # Trojan - XHTTP (Raw Multiplex Stream Pass)
        location /julpone-freenet-xh {
            proxy_pass http://127.0.0.1:10002;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_request_buffering off;
            chunked_transfer_encoding on;
            proxy_socket_keepalive on;
        }

        # ====================================================================
        # VMESS ROUTING PATHS (Aligned with config.json)
