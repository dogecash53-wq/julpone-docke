user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
events { 
    worker_connections 16384; 
    multi_accept on; 
}

http {
    include /etc/nginx/mime.types;
    
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080 default_server;
        server_name _;

        location = /health { return 200 "OK"; access_log off; }
        location / { root /usr/local/openresty/index/html; index index.html; try_files $uri $uri/ =404; }

        # --- WEBSOCKET GROUP (Trojan, VMESS, VLESS, SS) ---
        # Siguraduhin na ang lahat ng WS ay may Upgrade headers
        location ~ ^/(julpone-freenet|vmess-julpone|vless-julpone|ss-julpone)$ { 
            proxy_pass http://127.0.0.1:10000; # Pakipalitan ang port per service kung iba-iba sila sa config.json
            proxy_http_version 1.1; 
            proxy_set_header Upgrade $http_upgrade; 
            proxy_set_header Connection $connection_upgrade; 
            proxy_set_header Host $host;
            proxy_read_timeout 86400s; 
            proxy_send_timeout 86400s; 
            proxy_buffering off;
        }

        # --- HTTPUPGRADE GROUP (hu) ---
        location ~ ^/(julpone-freenet-hu|vmess-julpone-hu|vless-julpone-hu|ss-julpone-hu)$ { 
            proxy_pass http://127.0.0.1:10001; 
            proxy_http_version 1.1; 
            proxy_set_header Host $host;
            proxy_read_timeout 86400s; 
            proxy_buffering off;
        }

        # --- XHTTP GROUP (xh) ---
        location ~ ^/(julpone-freenet-xh|vmess-julpone-xh|vless-julpone-xh|ss-julpone-xh)$ { 
            proxy_pass http://127.0.0.1:10002; 
            proxy_http_version 1.1; 
            proxy_set_header Host $host;
            proxy_read_timeout 86400s; 
            proxy_buffering off;
        }
    }
}
