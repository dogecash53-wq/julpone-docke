# Global System Configurations para sa High-Concurrency Routing
user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # Mas mahabang timeouts para sa anti-disconnect at stability sa US/Global Routing
    keepalive_timeout 300s;
    keepalive_requests 100000;
    reset_timedout_connection on;
    
    # Iniwasang maging sobrang baba (10s) para hindi mag-timeout ang mabagal na kliyente
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;
    server_tokens off;

    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;
    proxy_connect_timeout 30s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080 default_server backlog=4096;
        server_name _;

        location = /health {
            return 200 "OK";
            add_header Content-Type text/plain;
            access_log off;
        }

        # 🔥 FIXED PATH: Itinugma sa Dockerfile destination folder para siguradong gagana ang web view
        location / {
            root /usr/local/openresty/index/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            access_log off;
        }

        # --- TROJAN ENDPOINTS ---
        location /julpone-freenet {
            proxy_pass http://127.0.0.1:10000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400s; # Ginawang 24 hours para sa no-timeout connection
            proxy_send_timeout 86400s;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_socket_keepalive on;
        }
        location /julpone-freenet-hu {
            proxy_pass http://127.0.0.1:10001;
            proxy_http_version 1.1;
