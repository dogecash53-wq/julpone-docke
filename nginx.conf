server {
    listen 8080 default_server;
    server_name _;

    # --- WEBSOCKET (WS) ---
    location /julpone-freenet { proxy_pass http://127.0.0.1:10000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_buffering off; }
    location /vmess-julpone    { proxy_pass http://127.0.0.1:10003; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_buffering off; }
    location /vless-julpone    { proxy_pass http://127.0.0.1:10006; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_buffering off; }
    location /ss-julpone      { proxy_pass http://127.0.0.1:10009; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_buffering off; }

    # --- HTTPUPGRADE (HU) ---
    location /julpone-freenet-hu { proxy_pass http://127.0.0.1:10001; proxy_http_version 1.1; proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_buffering off; }
    location /vmess-julpone-hu    { proxy_pass http://127.0.0.1:10004; proxy_http_version 1.1; proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_buffering off; }
    location /vless-julpone-hu    { proxy_pass http://127.0.0.1:10007; proxy_http_version 1.1; proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_buffering off; }
    location /ss-julpone-hu      { proxy_pass http://127.0.0.1:10010; proxy_http_version 1.1; proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_buffering off; }

    # --- XHTTP (XH) ---
    location /julpone-freenet-xh { proxy_pass http://127.0.0.1:10002; proxy_http_version 1.1; proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_buffering off; }
    location /vmess-julpone-xh    { proxy_pass http://127.0.0.1:10005; proxy_http_version 1.1; proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_buffering off; }
    location /vless-julpone-xh    { proxy_pass http://127.0.0.1:10008; proxy_http_version 1.1; proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_buffering off; }
    location /ss-julpone-xh      { proxy_pass http://127.0.0.1:10011; proxy_http_version 1.1; proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_buffering off; }
}
