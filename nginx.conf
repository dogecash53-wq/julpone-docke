user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
events { worker_connections 16384; multi_accept on; }

http {
    include /etc/nginx/mime.types;
    
    # Map para sa tamang handling ng Connection header
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080 default_server;
        server_name _;

        # Health check para hindi mag-error ang Cloud Run
        location = /health { return 200 "OK"; access_log off; }
        
        location / { 
            root /usr/local/openresty/index/html; 
            index index.html; 
            try_files $uri $uri/ =404;
        }

        # Template para sa lahat ng location (dinagdagan ng timeouts)
        # Ang proxy_buffering off ay importante para sa real-time streaming (VPN)
        location ~ ^/(julpone-freenet|vmess-julpone|vless-julpone|ss-julpone)$ {
            proxy_pass http://127.0.0.1:10000; # Siguraduhin ang port per group
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }

        # Para sa ibang protocols, sundin lang ang pattern na ito:
        # Siguraduhin ang proxy_pass port ay tumutugma sa config.json mo
    }
}
