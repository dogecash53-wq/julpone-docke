user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080;
        server_name localhost;

        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_connect_timeout 60s;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # --- TROJAN PATHS ---
        location /julpone-freenet { proxy_pass http://127.0.0.1:10000; }
        location /julpone-freenet-hu { proxy_pass http://127.0.0.1:10001; }
        location /julpone-freenet-xh { proxy_pass http://127.0.0.1:10002; }

        # --- VMESS PATHS ---
        location /vmess-julpone-freenet { proxy_pass http://127.0.0.1:10003; }
        location /vmess-julpone-freenet-hu { proxy_pass http://127.0.0.1:10004; }
        location /vmess-julpone-freenet-xh { proxy_pass http://127.0.0.1:10005; }

        # --- VLESS PATHS ---
        location /vless-julpone-freenet { proxy_pass http://127.0.0.1:10006; }
        location /vless-julpone-freenet-hu { proxy_pass http://127.0.0.1:10007; }
        location /vless-julpone-freenet-xh { proxy_pass http://127.0.0.1:10008; }

        # --- SHADOWSOCKS PATHS ---
        location /ss-julpone-freenet { proxy_pass http://127.0.0.1:10009; }
        location /ss-julpone-freenet-hu { proxy_pass http://127.0.0.1:10010; }
        location /ss-julpone-freenet-xh { proxy_pass http://127.0.0.1:10011; }

        # Health Check Route para pumasa agad ang Cloud Run
        location / {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
