user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events { 
    worker_connections 16384; 
    multi_accept on; 
}

http {
    include /etc/nginx/mime.types;
    
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080 default_server;
        server_name _;

        location = /health { return 200 "OK"; access_log off; }
        location / { root /usr/local/openresty/index/html; index index.html; try_files $uri $uri/ =404; }

        # Lahat ng request ay ipapasa sa HAProxy (10000-10011)
        # Nginx -> HAProxy (10000+) -> Panares (20000+)

        # WS (WebSocket)
        location /julpone-freenet { proxy_pass http://127.0.0.1:10000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; }
        location /vmess-julpone    { proxy_pass http://127.0.0.1:10003; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; }
        location /vless-julpone    { proxy_pass http://127.0.0.1:10006; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; }
        location /ss-julpone      { proxy_pass http://127.0.0.1:10009; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; }

        # HU (HTTPUpgrade)
        location /julpone-freenet-hu { proxy_pass http://127.0.0.1:10001; }
        location /vmess-julpone-hu    { proxy_pass http://127.0.0.1:10004; }
        location /vless-julpone-hu    { proxy_pass http://127.0.0.1:10007; }
        location /ss-julpone-hu      { proxy_pass http://127.0.0.1:10010; }

        # XH (XHTTP)
        location /julpone-freenet-xh { proxy_pass http://127.0.0.1:10002; }
        location /vmess-julpone-xh    { proxy_pass http://127.0.0.1:10005; }
        location /vless-julpone-xh    { proxy_pass http://127.0.0.1:10008; }
        location /ss-julpone-xh      { proxy_pass http://127.0.0.1:10011; }
    }
}
