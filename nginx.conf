user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
events { 
    worker_connections 16384; 
    multi_accept on; 
}

http {
    include /etc/nginx/mime.types;
    map $http_upgrade $connection_upgrade { default upgrade; '' close; }

    server {
        listen 8080 default_server;
        server_name _;

        # --- DITO MO ILAGAY ANG ROOT SETTINGS ---
        location / { 
            root /usr/share/nginx/html; 
            index index.html; 
            try_files $uri $uri/ =404; 
        }

        location = /health { return 200 "OK"; access_log off; }
        
        # ... (itira ang ibang location blocks mo rito)
    }
        
        # --- WEBSOCKET (WS) ---
        location ~ ^/(julpone-freenet|vmess-julpone|vless-julpone|ss-julpone)$ {
            proxy_pass http://127.0.0.1:10000; # Siguraduhin na ito ay tumutugma sa HAProxy bind
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_read_timeout 86400s;
        }

        # --- HTTPUPGRADE (HU) ---
        location ~ ^/(julpone-freenet-hu|vmess-julpone-hu|vless-julpone-hu|ss-julpone-hu)$ {
            proxy_pass http://127.0.0.1:10001; 
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_read_timeout 86400s;
        }

        # --- XHTTP (XH) ---
        location ~ ^/(julpone-freenet-xh|vmess-julpone-xh|vless-julpone-xh|ss-julpone-xh)$ {
            proxy_pass http://127.0.0.1:10002; 
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 86400s;
        }
    }
}
