            proxy_socket_keepalive on;
        }
        location /julpone-freenet-grpc {
            grpc_pass grpc://127.0.0.1:10012;
            grpc_read_timeout 86400s;
            grpc_send_timeout 86400s;
            grpc_socket_keepalive on;
        }

