user nginx;
worker_processes auto;
worker_rlimit_nofile 65535; # Massive file descriptor limit for heavy traffic
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 4096; # Increased from 1024 for high-speed concurrent streams
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # High-Performance Network Tweaks
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 300s; # Longer keep-alive for active sessions
    keepalive_requests 100000;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # --- ADVANCED UPSTREAM KEEPALIVE BLOCKS ---
    # Keeps a warm persistent connection to Xray ports to slash latency
    upstream trojan_ws_backend { server 127.0.0.1:10000; keepalive 32; }
    upstream trojan_hu_backend { server 127.0.0.1:10001; keepalive 32; }
    upstream trojan_xh_backend { server 127.0.0.1:10002; keepalive 32; }
    
    upstream vmess_ws_backend { server 127.0.0.1:10003; keepalive 32; }
    upstream vmess_hu_backend { server 127.0.0.1:10004; keepalive 32; }
    upstream vmess_xh_backend { server 127.0.0.1:10005; keepalive 32; }
    
    upstream vless_ws_backend { server 127.0.0.1:10006; keepalive 32; }
    upstream vless_hu_backend { server 127.0.0.1:10007; keepalive 32; }
    upstream vless_xh_backend { server 127.0.0.1:10008; keepalive 32; }
    
    upstream ss_ws_backend { server 127.0.0.1:10009; keepalive 32; }
    upstream ss_hu_backend { server 127.0.0.1:10010; keepalive 32; }
    upstream ss_xh_backend { server 127.0.0.1:10011; keepalive 32; }

    server {
        listen 8080;
        server_name localhost;

        # Absolute direct zero-buffer flushing
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_connect_timeout 60s;
        
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # --- ROUTING VIA OPTIMIZED UPSTREAMS ---
        location /julpone-freenet { proxy_pass http://trojan_ws_backend; }
        location /julpone-freenet-hu { proxy_pass http://trojan_hu_backend; }
        location /julpone-freenet-xh { proxy_pass http://trojan_xh_backend; }

        location /vmess-julpone-freenet { proxy_pass http://vmess_ws_backend; }
        location /vmess-julpone-freenet-hu { proxy_pass http://vmess_hu_backend; }
        location /vmess-julpone-freenet-xh { proxy_pass http://vmess_xh_backend; }

        location /vless-julpone-freenet { proxy_pass http://vless_ws_backend; }
        location /vless-julpone-freenet-hu { proxy_pass http://vless_hu_backend; }
        location /vless-julpone-freenet-xh { proxy_pass http://vless_xh_backend; }

        location /ss-julpone-freenet { proxy_pass http://ss_ws_backend; }
        location /ss-julpone-freenet-hu { proxy_pass http://ss_hu_backend; }
        location /ss-julpone-freenet-xh { proxy_pass http://ss_xh_backend; }

        location / {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
