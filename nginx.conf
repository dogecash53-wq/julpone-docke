user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
events { worker_connections 16384; }

http {
    include /etc/nginx/mime.types;
    map $http_upgrade $connection_upgrade { default upgrade; '' close; }

    server {
        listen 8080 default_server;
        server_name _;

        location / { root /usr/share/nginx/html; index index.html; try_files $uri $uri/ =404; }
        location = /health { return 200 "OK"; access_log off; }

        # --- WEBSOCKET (WS) ---
        location /julpone-freenet { proxy_pass http://127.0.0.1:20000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; }
        location /vmess-julpone    { proxy_pass http://127.0.0.1:20003; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; }
        location /vless-julpone    { proxy_pass http://127.0.0.1:20006; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; }
        location /ss-julpone      { proxy_pass http://127.0.0.1:20009; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; }

        # --- HTTPUPGRADE (HU) ---
        location /julpone-freenet-hu { proxy_pass http://127.0.0.1:20001; proxy_http_version 1.1; proxy_buffering off; }
        location /vmess-julpone-hu    { proxy_pass http://127.0.0.1:20004; proxy_http_version 1.1; proxy_buffering off; }
        location /vless-julpone-hu    { proxy_pass http://127.0.0.1:20007; proxy_http_version 1.1; proxy_buffering off; }
        location /ss-julpone-hu      { proxy_pass http://127.0.0.1:20010; proxy_http_version 1.1; proxy_buffering off; }

        # --- XHTTP (XH) ---
        location /julpone-freenet-xh { proxy_pass http://127.0.0.1:20002; proxy_http_version 1.1; proxy_buffering off; proxy_request_buffering off; }
        location /vmess-julpone-xh    { proxy_pass http://127.0.0.1:20005; proxy_http_version 1.1; proxy_buffering off; proxy_request_buffering off; }
        location /vless-julpone-xh    { proxy_pass http://127.0.0.1:20008; proxy_http_version 1.1; proxy_buffering off; proxy_request_buffering off; }
        location /ss-julpone-xh      { proxy_pass http://127.0.0.1:20011; proxy_http_version 1.1; proxy_buffering off; proxy_request_buffering off; }
    }
}
