user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events { worker_connections 4096; multi_accept on; }

http {
    include /etc/nginx/mime.types;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 60s;
    server_tokens off;

    map $http_upgrade $connection_upgrade { default upgrade; '' close; }

    server {
        listen 8081 default_server;
        server_name _;

        location = /health { return 200 "OK"; }
        location / { root /usr/local/openresty/index/html; try_files $uri $uri/ /index.html; }

        # Proxy routes
        location /julpone-freenet { proxy_pass http://127.0.0.1:10000; include /etc/nginx/proxy_params; }
        location /julpone-freenet-hu { proxy_pass http://127.0.0.1:10001; include /etc/nginx/proxy_params; }
        location /julpone-freenet-xh { proxy_pass http://127.0.0.1:10002; include /etc/nginx/proxy_params; }
        location /vmess-julpone { proxy_pass http://127.0.0.1:10003; include /etc/nginx/proxy_params; }
        location /vmess-julpone-hu { proxy_pass http://127.0.0.1:10004; include /etc/nginx/proxy_params; }
        location /vmess-julpone-xh { proxy_pass http://127.0.0.1:10005; include /etc/nginx/proxy_params; }
        location /vless-julpone { proxy_pass http://127.0.0.1:10006; include /etc/nginx/proxy_params; }
        location /vless-julpone-hu { proxy_pass http://127.0.0.1:10007; include /etc/nginx/proxy_params; }
        location /vless-julpone-xh { proxy_pass http://127.0.0.1:10008; include /etc/nginx/proxy_params; }
        location /ss-julpone { proxy_pass http://127.0.0.1:10009; include /etc/nginx/proxy_params; }
        location /ss-julpone-hu { proxy_pass http://127.0.0.1:10010; include /etc/nginx/proxy_params; }
        location /ss-julpone-xh { proxy_pass http://127.0.0.1:10011; include /etc/nginx/proxy_params; }
    }
}
