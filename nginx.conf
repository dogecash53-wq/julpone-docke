user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events { 
    worker_connections 16384; 
    multi_accept on; 
}

http {
    include /etc/nginx/mime.types;
    
    # Map para sa tamang handling ng Connection header (para sa WebSocket)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080 default_server;
        server_name _;

        location = /health { return 200 "OK"; access_log off; }
        location / { root /usr/local/openresty/index/html; index index.html; try_files $uri $uri/ =404; }

        # --- WEBSOCKET (WS) - Kailangan ng Upgrade headers ---
        location /julpone-freenet { proxy_pass http://127.0.0.1:10000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_read_timeout 86400s; proxy_buffering off; }
        location /vmess-julpone    { proxy_pass http://127.0.0.1:10003; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_read_timeout 86400s; proxy_buffering off; }
        location /vless-julpone    { proxy_pass http://127.0.0.1:10006; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_read_timeout 86400s; proxy_buffering off; }
        location /ss-julpone      { proxy_pass http://127.0.0.1:10009; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_read_timeout 86400s; proxy_buffering off; }

        # --- HTTPUPGRADE (HU) at XHTTP (XH) - HINDI kailangan ng Upgrade headers ---
        location /julpone-freenet-hu { proxy_pass http://127.0.0.1:10001; proxy_read_timeout 86400s; proxy_buffering off; }
        location /julpone-freenet-xh { proxy_pass http://127.0.0.1:10002; proxy_read_timeout 86400s; proxy_buffering off; }
        location /vmess-julpone-hu    { proxy_pass http://127.0.0.1:10004; proxy_read_timeout 86400s; proxy_buffering off; }
        location /vmess-julpone-xh    { proxy_pass http://127.0.0.1:10005; proxy_read_timeout 86400s; proxy_buffering off; }
        location /vless-julpone-hu    { proxy_pass http://127.0.0.1:10007; proxy_read_timeout 86400s; proxy_buffering off; }
        location /vless-julpone-xh    { proxy_pass http://127.0.0.1:10008; proxy_read_timeout 86400s; proxy_buffering off; }
        location /ss-julpone-hu      { proxy_pass http://127.0.0.1:10010; proxy_read_timeout 86400s; proxy_buffering off; }
        location /ss-julpone-xh      { proxy_pass http://127.0.0.1:10011; proxy_read_timeout 86400s; proxy_buffering off; }
    }
}
