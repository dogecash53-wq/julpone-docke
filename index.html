<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JULPONE FREENET SERVICE</title>
    <style>
        :root {
            --bg: #090b0e;
            --surface: #11151c;
            --surface2: #1b202a;
            --border: #263042;
            --text: #f0f4f8;
            --text-dim: #7a8b9e;
            --accent: #00f2fe;
            --glow: #00f2fe;
            --green: #00e676;
            --red: #ff3d00;
            --yellow: #ffea00;
            --blue: #2979ff;
            --font-mono: 'Courier New', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-size-base: clamp(12px, 3.2vw, 15px);
            --font-size-sm: clamp(10px, 2.8vw, 13px);
            --font-size-lg: clamp(16px, 4.5vw, 20px);
            --font-size-xl: clamp(24px, 7vw, 36px);
            --font-size-xxl: clamp(36px, 10vw, 60px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: var(--font-size-base);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            padding: 16px 0;
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes glowPulseStrong {
            0%, 100% { text-shadow: 0 0 12px var(--glow), 0 0 24px var(--glow); }
            50% { text-shadow: 0 0 6px var(--glow), 0 0 12px var(--glow); }
        }

        @keyframes glowPulseLight {
            0%, 100% { text-shadow: 0 0 4px var(--glow); }
            50% { text-shadow: 0 0 1px var(--glow); }
        }

        .fade-in { animation: fadeInUp 0.5s ease-out forwards; }
        .glow-text-strong { animation: glowPulseStrong 2.5s ease-in-out infinite; }
        .glow-text-light { animation: glowPulseLight 3s ease-in-out infinite; }

        /* LOADING COMPONENT SCREEN */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(9,11,14,0.98);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 9999;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-digits {
            font-size: var(--font-size-xl);
            font-weight: 900;
            font-family: var(--font-mono);
            letter-spacing: 4px;
            color: var(--accent);
            text-align: center;
        }

        .loading-subtitle {
            margin-top: 14px;
            font-size: var(--font-size-sm);
            color: var(--text-dim);
            letter-spacing: 1.5px;
            text-align: center;
        }

        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
        }

        .section:hover {
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.05);
        }

        .section-title {
            font-weight: 700;
            font-size: var(--font-size-lg);
            text-align: center;
            margin-bottom: 4px;
            letter-spacing: 1px;
            color: var(--text);
        }

        .section-subtitle {
            font-size: var(--font-size-sm);
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        /* CONFIG COMPILER FORM OBJECTS */
        .form-group {
            margin-bottom: 12px;
        }

        .form-label {
            font-size: var(--font-size-sm);
            color: var(--text-dim);
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: var(--font-size-base);
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .button-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-top: 6px;
        }

        .btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: var(--font-size-sm);
            transition: all 0.2s ease;
            letter-spacing: 0.4px;
        }

        .btn:hover {
            border-color: var(--accent);
            background: #202735;
        }

        .btn.active {
            border-color: var(--accent);
            background: #1e293b;
            color: var(--accent);
            font-weight: bold;
            text-shadow: 0 0 4px var(--accent);
        }

        .btn-submit {
            width: 100%;
            background: var(--accent);
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            cursor: pointer;
            font-family: var(--font-mono);
            transition: all 0.2s ease;
        }

        .btn-submit:hover {
            opacity: 0.9;
            transform: scale(0.99);
        }

        .config-area {
            width: 100%;
            height: 90px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--green);
            padding: 8px;
            font-family: var(--font-mono);
            font-size: clamp(10px, 2.8vw, 12px);
            resize: none;
            outline: none;
            margin-top: 4px;
        }

        .copy-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: var(--font-size-sm);
            color: var(--text-dim);
            margin-top: 10px;
        }

        .copy-link {
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
        }

        .status-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 4px;
            gap: 10px;
        }

        .status-item { text-align: center; flex: 1; }
        .status-label { font-size: var(--font-size-sm); color: var(--text-dim); }
        .status-value { font-size: var(--font-size-lg); font-weight: 700; }
        .status-value.active { color: var(--green); }
        .status-value.ping { color: var(--yellow); }
    </style>
</head>
<body>

    <!-- AUDIO ELEMENT ENGINE WITH CAPABILITY PRELOADS -->
    <audio id="bgAudio" loop preload="auto">
        <source src="https://mixkit.co" type="audio/mpeg">
    </audio>

    <!-- LOADING SCREEN COMPONENT -->
    <div id="loading-screen">
        <div class="loading-digits glow-text-strong" id="loadLogs">INITIALIZING CORE...</div>
        <div class="loading-subtitle">PANARES CORE MEMBRANE SYSTEM v4.0</div>
    </div>

    <!-- MAIN INTERFACE CORE -->
    <div class="container fade-in">
        
        <!-- SECTION 1: NETWORK MONITORS -->
        <div class="section">
            <div class="section-title glow-text-light">PANARES INFRASTRUCTURE</div>
            <div class="section-subtitle">Anti-Timeout Nodes & Localized Adblocker</div>
            
            <div class="status-row">
                <div class="status-item">
                    <div class="status-label">SYSTEM CORE</div>
                    <div class="status-value active">ONLINE</div>
                </div>
                <div class="status-item">
                    <div class="status-label">ADBLOCKER</div>
                    <div class="status-value active">ACTIVE</div>
                </div>
                <div class="status-item">
                    <div class="status-label">GLOBAL REGION</div>
                    <div class="status-value ping">US / MULTI</div>
                </div>
            </div>
        </div>

        <!-- SECTION 2: CONFIG GENERATOR ENGINE -->
        <div class="section">
            <div class="section-title">CONFIG GENERATOR</div>
