<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JULPONE NETWORK | JP CONFIG CENTER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #020617;
            --secondary: #0b1329;
            --accent: #ff6b00;
            --accent-light: #ff9100;
            --info: #00f0ff;
            --text: #f1f5f9;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.06);
            --success: #00ff88;
            --warning: #ffb700;
            --danger: #ff0055;
            --shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--primary);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 60%);
            min-height: 100vh;
        }

        /* Splash Screen overlay */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #020617;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        #splash-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 107, 0, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #main-ui {
            opacity: 0;
            transition: opacity 0.5s ease;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }
        header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media(min-width: 900px) {
            .grid-layout { grid-template-columns: 1.4fr 1fr; }
        }

        .panel {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .panel::before {
            content: ''; position: absolute; top:0; left:0; width:100%; height:2px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        /* Dropdowns form controls */
        .control-group {
            margin-bottom: 20px;
        }
        .control-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .dropdown-wrapper {
            position: relative;
        }
        .dropdown-btn {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            color: #fff;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
        }
        .dropdown-btn:hover {
            border-color: rgba(255,107,0,0.4);
            background: rgba(255,255,255,0.05);
        }
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 5px);
            left: 0; width: 100%;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 10px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .dropdown-item:hover, .dropdown-item.selected {
            background: var(--accent);
            color: #000;
            font-weight: 600;
        }

        /* Option Selector Group buttons */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .btn-option {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-option:hover {
            border-color: rgba(255,255,255,0.15);
        }
        .btn-option.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-color: transparent;
            color: #000;
            box-shadow: 0 4px 15px rgba(255,107,0,0.3);
        }

        /* Live Status Panel elements */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .status-row:last-child { border: none; margin:0; padding:0; }
        .status-lbl { color: var(--text-muted); font-size: 0.9rem; }
        .status-val { font-weight: 600; font-size: 0.95rem; }
        .status-flex { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b; }
        .status-dot.green { background: var(--success); box-shadow: 0 0 8px var(--success); }

        /* Speed at Ping Stats Metrics grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .metric-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        .metric-lbl { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .metric-num { font-size: 1.25rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .metric-unit { font-size: 0.8rem; color: var(--text-muted); margin-left: 2px; }

        /* Data stream visualizer graph */
        .visualizer-container {
            height: 60px;
            background: rgba(0,0,0,0.15);
            border-radius: 10px;
            margin-top: 15px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            padding: 0 5px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .vis-bar {
            flex: 1;
            background: linear-gradient(to top, var(--accent), var(--info));
            border-radius: 2px 2px 0 0;
            height: 10px;
            transition: height 0.2s ease;
        }

        /* Log terminal panel style */
        .terminal {
            background: #020617;
            border: 1px solid var(--border);
            border-radius: 12px;
            height: 140px;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            overflow-y: auto;
            margin-top: 15px;
        }
        .log-entry { margin-bottom: 4px; line-height: 1.4; color: #cbd5e1; }

        /* Big Configuration Result Output area */
        .output-box {
            background: #020617;
            border: 1px solid rgba(255,107,0,0.15);
            border-radius: 12px;
            padding: 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            min-height: 100px;
            max-height: 160px;
            overflow-y: auto;
            word-break: break-all;
            white-space: pre-wrap;
            color: var(--info);
            margin-top: 15px;
        }
        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #e05e00);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 20px rgba(255,107,0,0.25);
            letter-spacing: 1px;
        }
        .action-btn:active { transform: scale(0.98); }
        .action-btn.copied {
            background: linear-gradient(135deg, var(--success), #00d672);
            box-shadow: 0
