<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JULPONE NETWORK | JP CONFIG CENTER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #020617;
            --secondary: #0b1329;
            --accent: #ff6b00;
            --accent-light: #ff9100;
            --info: #00f0ff;
            --text: #f1f5f9;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.06);
            --success: #00ff88;
            --warning: #ffb700;
            --danger: #ff0055;
            --shadow: 0 20px 40px rgba(0,0,0,0.5);
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius: 16px;
            --transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 50% 0%, #101432 0%, #050716 70%, #020308 100%);
            color: var(--text);
            font-family: var(--font-main);
            min-height: 100vh;
            padding: 24px 12px;
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* [REST OF YOUR CSS REMAINS THE SAME] */
        .container { max-width: 720px; margin: 0 auto; display: grid; gap: 16px; }
        .card { background: rgba(11, 19, 41, 0.45); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
        .config-box { width: 100%; min-height: 110px; max-height: 200px; overflow-y: auto; background: #020617; border: 1px solid rgba(0, 255, 136, 0.2); border-radius: 12px; padding: 16px; font-family: var(--font-mono); font-size: 12px; color: var(--success); white-space: pre-wrap; }
        .btn-option { padding: 14px 10px; background: rgba(2, 6, 23, 0.4); border: 1px solid var(--border); color: var(--text-muted); border-radius: 12px; cursor: pointer; text-align: center; }
        .btn-option.active { background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: #fff; }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <div class="card">
        <h2 class="section-heading">GENERATED CONFIG</h2>
        <div class="config-container">
            <button class="copy-button" id="copy-action">COPY</button>
            <div class="config-box" id="config-output"></div>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';
    
    // Config variables
    const TROJAN_PASS = 'julpone-freenet';
    const UUID = 'b8a166be-4b9b-449e-8736-22485fb0b04a';
    const SS_PASS = 'julpone-freenet';

    let selectedProto = 'trojan';
    let selectedTrans = 'ws';
    let selectedAddr = 'firebase-settings.crashlytics.com';
    let selectedSNI = 'firebase-settings.crashlytics.com';
    const currentHost = window.location.hostname || 'localhost';

    // FIX SA GENERATOR
    function buildConfig() {
        const addr = selectedAddr;
        const sni = selectedSNI;
        const host = currentHost;
        
        // I-map natin ang shortcode sa official transport names
        const netTypeMap = { ws: 'ws', hu: 'httpupgrade', xh: 'xhttp' };
        const xrayNet = netTypeMap[selectedTrans] || 'ws';
        
        const path = (selectedProto === 'trojan' ? '/julpone-freenet' : (selectedProto === 'vmess' ? '/vmess-julpone' : (selectedProto === 'vless' ? '/vless-julpone' : '/ss-julpone'))) + (selectedTrans === 'ws' ? '' : '-' + selectedTrans);
        const encPath = encodeURIComponent(path);

        switch(selectedProto) {
            case 'trojan':
                return `trojan://${TROJAN_PASS}@${addr}:443?type=${xrayNet}&host=${host}&path=${encPath}&security=tls&fp=chrome&sni=${sni}#JP-TROJAN-${selectedTrans.toUpperCase()}`;
            case 'vmess':
                return 'vmess://' + btoa(JSON.stringify({
                    v:'2', ps:`JP-VMESS-${selectedTrans.toUpperCase()}`, add:addr, port:'443', id:UUID, aid:'0', scy:'auto',
                    net:xrayNet, type:'none', host:host, path:path, tls:'tls', sni:sni, fp:'chrome'
                }));
            case 'vless':
                return `vless://${UUID}@${addr}:443?encryption=none&type=${xrayNet}&host=${host}&path=${encPath}&security=tls&sni=${sni}#JP-VLESS-${selectedTrans.toUpperCase()}`;
            case 'ss':
                const ssInfo = btoa(`aes-256-gcm:${SS_PASS}`);
                // Para sa Shadowsocks, kailangan ng tamang plugin mode
                const plugin = `v2ray-plugin;mode=${xrayNet};host=${host};path=${path};tls;sni=${sni}`;
                return `ss://${ssInfo}@${addr}:443?plugin=${encodeURIComponent(plugin)}#JP-SS-${selectedTrans.toUpperCase()}`;
            default: return '';
        }
    }

    // Function to update output
    function updateConfig() {
        document.getElementById('config-output').textContent = buildConfig();
    }

    // ... (rest of your logic functions)
    updateConfig();
})();
</script>
</body>
</html>
